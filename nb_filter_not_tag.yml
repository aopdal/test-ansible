---
plugin: netbox.netbox.nb_inventory
validate_certs : False
config_context: True
prefixes: False
interfaces: False
group_by:
  - tags
compose:
  device_id: id
query_filters:
  - platform: "ubuntu"
  - tag__n: legacy-managed
  - tag: autoupdate
device_query_filters:
  - has_primary_ip: True
  - status: active
vm_query_filters:
  - has_primary_ip: True
  - status: active

